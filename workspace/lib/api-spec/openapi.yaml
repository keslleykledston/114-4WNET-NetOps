components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    AuditLog:
      type: object
      required: [id, action, objectType, objectId, createdAt]
      properties:
        id:
          type: integer
        actorId:
          type: ["integer", "null"]
        actor:
          type: string
        action:
          type: string
        objectType:
          type: string
        objectId:
          type: string
        metadataJson:
          type: ["object", "null"]
          additionalProperties: true
        sourceIp:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    AuditLogListResponse:
      type: array
      items:
        $ref: "#/components/schemas/AuditLog"

    Report:
      type: object
      required: [id, provisioningJobId, reportType, contentMarkdown, generatedAt]
      properties:
        id:
          type: integer
        provisioningJobId:
          type: integer
        reportType:
          type: string
        contentMarkdown:
          type: string
        generatedBy:
          type: ["string", "null"]
        generatedAt:
          type: string
          format: date-time
        jobName:
          type: ["string", "null"]
        jobType:
          type: ["string", "null"]

    ReportListResponse:
      type: array
      items:
        $ref: "#/components/schemas/Report"

    IntegrationSetting:
      type: object
      required: [id, name, enabled, configJson, createdAt, updatedAt]
      properties:
        id:
          type: integer
        name:
          type: string
        enabled:
          type: boolean
        configJson:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    IntegrationListResponse:
      type: array
      items:
        $ref: "#/components/schemas/IntegrationSetting"

    DiscoveryStatus:
      type: string
      enum: [full, partial, fallback, cached, failed]

    DiscoverySource:
      type: string
      enum: [ssh_live, ssh_running_config, manual_upload, snmp_snapshot, local_db, netbox]

    DiscoveryConfidence:
      type: string
      enum: [high, medium, low]

    DiscoveryEvidenceSummary:
      type: object
      required: [source, confidence]
      properties:
        source:
          $ref: "#/components/schemas/DiscoverySource"
        confidence:
          $ref: "#/components/schemas/DiscoveryConfidence"
        evidence:
          type: string

    SourceSummary:
      type: object
      required: [ssh, snmp, cachedConfig]
      properties:
        ssh:
          type: string
          enum: [success, failed, skipped]
        snmp:
          type: string
          enum: [success, failed, skipped]
        cachedConfig:
          type: string
          enum: [used, available, missing, skipped]

    DeviceDiscoveryRequest:
      type: object
      required: [contexts, preferLiveSsh, allowSnmpFallback, useCachedConfig]
      properties:
        contexts:
          type: array
          items:
            type: string
            enum: [interfaces, bgp, l2vpn, policies, vrfs]
        preferLiveSsh:
          type: boolean
        allowSnmpFallback:
          type: boolean
        useCachedConfig:
          type: boolean

    DiscoveryWarning:
      type: object
      required: [level, message, source]
      properties:
        level:
          type: string
          enum: [info, warning, error]
        message:
          type: string
        source:
          type: string

    RoutePolicyNode:
      type: object
      required: [sequence, action, matches, applies, evidence]
      properties:
        sequence:
          type: ["integer", "null"]
        action:
          type: ["string", "null"]
        matches:
          type: array
          items:
            type: string
        applies:
          type: array
          items:
            type: string
        evidence:
          $ref: "#/components/schemas/DiscoveryEvidenceSummary"

    DiscoveryNamedEntries:
      allOf:
        - $ref: "#/components/schemas/DiscoveryEvidenceSummary"
        - type: object
          required: [name, entries]
          properties:
            name:
              type: string
            entries:
              type: array
              items: {}

    RoutePolicySummary:
      allOf:
        - $ref: "#/components/schemas/DiscoveryEvidenceSummary"
        - type: object
          required: [name, nodes]
          properties:
            name:
              type: string
            nodes:
              type: array
              items:
                $ref: "#/components/schemas/RoutePolicyNode"

    L2vpnSummary:
      allOf:
        - $ref: "#/components/schemas/DiscoveryEvidenceSummary"
        - type: object
          required: [l2vcs, vsis]
          properties:
            l2vcs:
              type: array
              items: {}
            vsis:
              type: array
              items: {}

    InterfaceSummary:
      allOf:
        - $ref: "#/components/schemas/NetopsInterface"
        - $ref: "#/components/schemas/DiscoveryEvidenceSummary"
        - type: object
          required: [exists]
          properties:
            exists:
              type: boolean

    BgpPeerSummary:
      type: object
      required:
        - peerIp
        - state
        - role
        - roleSource
        - addressFamily
        - sessionType
        - source
        - confidence
        - category
        - primaryDirection
        - largeReceivedRoutes
        - largeAdvertisedRoutes
        - autoLoadRoutes
        - requiresExplicitRouteSearch
      properties:
        peerIp:
          type: string
        remoteAs:
          type: ["integer", "null"]
        description:
          type: ["string", "null"]
        name:
          type: ["string", "null"]
        state:
          type: string
          enum: [Established, Idle, Active, Connect, Unknown]
        role:
          type: string
          enum: [provider, customer, cdn, ix, cdn_ix, ibgp, unknown]
        roleSource:
          type: string
          enum: [manual_override, classifier, snapshot, unknown]
        addressFamily:
          type: string
          enum: [ipv4, ipv6, unknown]
        sessionType:
          type: string
          enum: [iBGP, eBGP, unknown]
        vrf:
          type: ["string", "null"]
        importPolicy:
          type: ["string", "null"]
        exportPolicy:
          type: ["string", "null"]
        receivedPrefixes:
          type: ["integer", "null"]
        advertisedPrefixes:
          type: ["integer", "null"]
        activePrefixes:
          type: ["integer", "null"]
        uptime:
          type: ["string", "null"]
        source:
          $ref: "#/components/schemas/DiscoverySource"
        confidence:
          $ref: "#/components/schemas/DiscoveryConfidence"
        evidence:
          type: string
        category:
          type: string
          enum: [provider, customer, cdn, ix, cdn_ix, ibgp, unknown]
        primaryDirection:
          type: string
          enum: [import, export, internal]
        largeReceivedRoutes:
          type: boolean
        largeAdvertisedRoutes:
          type: boolean
        autoLoadRoutes:
          type: boolean
          enum: [false]
        requiresExplicitRouteSearch:
          type: boolean

    BgpPeerDetails:
      type: object
      required: [peer, category, primaryDirection, importPolicy, exportPolicy, primaryPolicy, secondaryPolicy, routePolicyNodes, routeCounters, operationalState, protections, evidence]
      properties:
        peer:
          $ref: "#/components/schemas/BgpPeerSummary"
        category:
          type: string
          enum: [provider, customer, cdn, ix, cdn_ix, ibgp, unknown]
        primaryDirection:
          type: string
          enum: [import, export, internal]
        importPolicy:
          type: ["string", "null"]
        exportPolicy:
          type: ["string", "null"]
        primaryPolicy:
          type: ["string", "null"]
        secondaryPolicy:
          type: ["string", "null"]
        routePolicyNodes:
          type: array
          items:
            $ref: "#/components/schemas/RoutePolicyNode"
        referencedIpPrefixes:
          type: array
          items:
            $ref: "#/components/schemas/DiscoveryNamedEntries"
        referencedCommunityFilters:
          type: array
          items:
            $ref: "#/components/schemas/DiscoveryNamedEntries"
        referencedCommunityLists:
          type: array
          items:
            $ref: "#/components/schemas/DiscoveryNamedEntries"
        routeCounters:
          type: object
          required: [receivedRoutes, advertisedRoutes, largeReceivedRoutes, largeAdvertisedRoutes, autoLoadRoutes, requiresExplicitRouteSearch]
          properties:
            receivedRoutes:
              type: ["integer", "null"]
            advertisedRoutes:
              type: ["integer", "null"]
            largeReceivedRoutes:
              type: boolean
            largeAdvertisedRoutes:
              type: boolean
            autoLoadRoutes:
              type: boolean
              enum: [false]
            requiresExplicitRouteSearch:
              type: boolean
        operationalState:
          type: string
        protections:
          type: object
          required: [noFullDumpAutomatic, sampleLimit, maxAutoRoutes]
          properties:
            noFullDumpAutomatic:
              type: boolean
              enum: [true]
            sampleLimit:
              type: integer
            maxAutoRoutes:
              type: integer
        evidence:
          type: array
          items:
            $ref: "#/components/schemas/DiscoveryEvidenceSummary"

    DeviceDiscoverySnapshot:
      type: object
      required: [deviceId, discoveryRunId, status, contexts, startedAt, finishedAt, sourceStatus, sourcesUsed, interfaces, bgpPeers, policies, communities, communityLists, prefixLists, vrfs, l2vpn, warnings, audit]
      properties:
        deviceId:
          type: integer
        discoveryRunId:
          type: string
        status:
          $ref: "#/components/schemas/DiscoveryStatus"
        contexts:
          type: array
          items:
            type: string
        startedAt:
          type: string
        finishedAt:
          type: string
        sourceStatus:
          $ref: "#/components/schemas/SourceSummary"
        persistedRunId:
          type: integer
        persistedSnapshotId:
          type: ["integer", "null"]
        cachedFromPersistedSnapshot:
          type: boolean
        sourcesUsed:
          type: array
          items:
            $ref: "#/components/schemas/DiscoverySource"
        interfaces:
          type: array
          items:
            $ref: "#/components/schemas/InterfaceSummary"
        bgpPeers:
          type: array
          items:
            $ref: "#/components/schemas/BgpPeerSummary"
        policies:
          type: array
          items:
            $ref: "#/components/schemas/RoutePolicySummary"
        communities:
          type: array
          items:
            $ref: "#/components/schemas/DiscoveryNamedEntries"
        communityLists:
          type: array
          items:
            $ref: "#/components/schemas/DiscoveryNamedEntries"
        prefixLists:
          type: array
          items:
            $ref: "#/components/schemas/DiscoveryNamedEntries"
        vrfs:
          type: array
          items: {}
        l2vpn:
          $ref: "#/components/schemas/L2vpnSummary"
        warnings:
          type: array
          items:
            $ref: "#/components/schemas/DiscoveryWarning"
        audit:
          type: array
          items:
            $ref: "#/components/schemas/DiscoveryWarning"

    DeviceDiscoveryResponse:
      $ref: "#/components/schemas/DeviceDiscoverySnapshot"

    RouteQueryRequest:
      type: object
      properties:
        direction:
          type: string
          enum: [received, advertised]
        filter:
