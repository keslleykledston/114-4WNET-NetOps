services:
  db:
    image: postgres:16-alpine
    container_name: netops-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-netops}
      POSTGRES_USER: ${POSTGRES_USER:-netops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-netops}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  migrate:
    build:
      context: .
      target: api-runtime
    container_name: netops-migrate
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-netops}:${POSTGRES_PASSWORD:-netops}@db:5432/${POSTGRES_DB:-netops}
      SESSION_SECRET: ${SESSION_SECRET:-netops-default-secret-key-32bytes}
    command: ["pnpm", "--filter", "@workspace/db", "run", "migrate:safe"]
    restart: "no"

  api:
    build:
      context: .
      target: api-runtime
    container_name: netops-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      PORT: 8080
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-netops}:${POSTGRES_PASSWORD:-netops}@db:5432/${POSTGRES_DB:-netops}
      SESSION_SECRET: ${SESSION_SECRET:-netops-default-secret-key-32bytes}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CONFIG_APPLY_ENABLED: ${CONFIG_APPLY_ENABLED:-false}
      DRY_RUN_DEFAULT: ${DRY_RUN_DEFAULT:-true}
      NETOPS_SNMP_REAL_ENABLED: ${NETOPS_SNMP_REAL_ENABLED:-false}
      SNMP_FAST_PILOT_DEVICE_IDS: ${SNMP_FAST_PILOT_DEVICE_IDS:-*}
      L2_DISCOVER_SSH_ENABLED: ${L2_DISCOVER_SSH_ENABLED:-false}
      L2_OPERATIONAL_REFRESH_ENABLED: ${L2_OPERATIONAL_REFRESH_ENABLED:-false}
      L2_OPERATIONAL_REFRESH_SSH_CONFIG: ${L2_OPERATIONAL_REFRESH_SSH_CONFIG:-false}
      NETBOX_ENABLED: ${NETBOX_ENABLED:-false}
      NETBOX_URL: ${NETBOX_URL:-}
      NETBOX_TOKEN: ${NETBOX_TOKEN:-}
      NETBOX_SKIP_TLS_VERIFY: ${NETBOX_SKIP_TLS_VERIFY:-false}
      NETBOX_TIMEOUT_MS: ${NETBOX_TIMEOUT_MS:-10000}
      NETBOX_PAGE_SIZE: ${NETBOX_PAGE_SIZE:-100}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_NAME: ${ADMIN_NAME:-Admin}
      NETOPS_WG_SERVER_PUBLIC_KEY: ${NETOPS_WG_SERVER_PUBLIC_KEY:-}
      NETOPS_WG_ENDPOINT: ${NETOPS_WG_ENDPOINT:-vpn.netops.local:51820}
      NETOPS_WG_DEFAULT_ALLOWED_IPS: ${NETOPS_WG_DEFAULT_ALLOWED_IPS:-10.0.0.0/8,192.168.0.0/16}
      NETOPS_WG_SERVER_ADDRESS: ${NETOPS_WG_SERVER_ADDRESS:-10.255.0.1}
      NETOPS_WG_IP_POOL_BASE: ${NETOPS_WG_IP_POOL_BASE:-10.255.0.}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8080/api/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "${API_PORT:-8080}:8080"

  wg-hub:
    build:
      context: ./infra/wireguard-hub
    container_name: netops-wg-hub
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "${NETOPS_WG_PORT:-51820}:51820/udp"
    volumes:
      - ./infra/wireguard-hub/secrets/wg0.conf:/etc/wireguard/wg0.conf:ro

  web:
    build:
      context: .
      target: frontend-runtime
      args:
        FRONTEND_PORT: 24780
        BASE_PATH: /
    container_name: netops-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "${WEB_PORT:-3000}:80"

volumes:
  postgres-data:
